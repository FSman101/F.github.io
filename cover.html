<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一封给你的信</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffeef8 0%, #ffe0f0 100%);
            font-family: 'Noto Serif SC', serif;
            overflow: hidden;
        }

        /* 飘落的花瓣 */
        .petal {
            position: absolute;
            width: 15px;
            height: 15px;
            background: radial-gradient(circle, #ffb6c1 0%, #ffc0cb 100%);
            border-radius: 50% 0 50% 50%;
            opacity: 0.6;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* 信封容器 */
        .envelope-container {
            position: relative;
            width: 320px;
            height: 200px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .envelope-container:hover {
            transform: scale(1.05);
        }

        /* 信封主体 */
        .envelope {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #fff5f7 0%, #ffe8f0 100%);
            border-radius: 0 0 10px 10px;
            box-shadow: 0 10px 40px rgba(255, 182, 193, 0.4);
        }

        /* 信封翻盖 */
        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(145deg, #ffe8f0 0%, #ffd0e0 100%);
            clip-path: polygon(0 0, 50% 100%, 100% 0);
            transform-origin: top;
            transition: transform 0.6s ease;
            z-index: 10;
        }

        .envelope-container.open .envelope-flap {
            transform: rotateX(180deg);
        }

        /* 信封底部 */
        .envelope-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(145deg, #ffe0e8 0%, #ffd0e0 100%);
            clip-path: polygon(0 100%, 50% 0, 100% 100%);
        }

        /* 信封两侧 */
        .envelope-left {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(145deg, #fff0f5 0%, #ffe0e8 100%);
            clip-path: polygon(0 0, 100% 50%, 0 100%);
        }

        .envelope-right {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(145deg, #fff0f5 0%, #ffe0e8 100%);
            clip-path: polygon(100% 0, 0 50%, 100% 100%);
        }

        /* 蜡封 */
        .wax-seal {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #ff69b4 0%, #ff1493 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(255, 20, 147, 0.3);
            z-index: 20;
            transition: all 0.3s ease;
        }

        .wax-seal::before {
            content: '💌';
            font-size: 28px;
        }

        .envelope-container:hover .wax-seal {
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 0 6px 20px rgba(255, 20, 147, 0.5);
        }

        /* 提示文字 */
        .hint-text {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff69b4;
            font-size: 16px;
            white-space: nowrap;
            opacity: 0.8;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.6;
                transform: translateX(-50%) scale(1);
            }
            50% {
                opacity: 1;
                transform: translateX(-50%) scale(1.05);
            }
        }

        /* 打开按钮 */
        .open-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #ffb6c1 0%, #ff69b4 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 105, 180, 0.4);
            z-index: 30;
            opacity: 0;
            transition: all 0.5s ease;
            pointer-events: none;
        }

        .open-btn::before {
            content: '✨';
            font-size: 32px;
        }

        .envelope-container.open .open-btn {
            opacity: 1;
            pointer-events: auto;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        /* 标题 */
        .title {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff69b4;
            font-size: 28px;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(255, 182, 193, 0.3);
        }

        /* 光晕效果 */
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 182, 193, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.5;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.8;
            }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .envelope-container {
                width: 280px;
                height: 175px;
            }
            
            .wax-seal {
                width: 50px;
                height: 50px;
            }
            
            .wax-seal::before {
                font-size: 24px;
            }
            
            .open-btn {
                width: 70px;
                height: 70px;
            }
            
            .open-btn::before {
                font-size: 28px;
            }
            
            .title {
                font-size: 24px;
                top: 70px;
            }
            
            .hint-text {
                font-size: 14px;
                bottom: -50px;
            }
            
            .glow {
                width: 300px;
                height: 300px;
            }
        }

        /* 小屏幕手机适配 */
        @media (max-width: 480px) {
            .envelope-container {
                width: 240px;
                height: 150px;
            }
            
            .wax-seal {
                width: 45px;
                height: 45px;
            }
            
            .wax-seal::before {
                font-size: 20px;
            }
            
            .open-btn {
                width: 60px;
                height: 60px;
            }
            
            .open-btn::before {
                font-size: 24px;
            }
            
            .title {
                font-size: 20px;
                top: 60px;
            }
            
            .hint-text {
                font-size: 12px;
                bottom: -45px;
            }
            
            .glow {
                width: 250px;
                height: 250px;
            }
            
            .petal {
                width: 10px;
                height: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- 飘落的花瓣 -->
    <div class="petal" style="left: 10%; animation-duration: 8s; animation-delay: 0s;"></div>
    <div class="petal" style="left: 30%; animation-duration: 10s; animation-delay: 2s;"></div>
    <div class="petal" style="left: 50%; animation-duration: 9s; animation-delay: 4s;"></div>
    <div class="petal" style="left: 70%; animation-duration: 11s; animation-delay: 1s;"></div>
    <div class="petal" style="left: 90%; animation-duration: 8s; animation-delay: 3s;"></div>

    <!-- 光晕 -->
    <div class="glow"></div>

    <!-- 标题 -->
    <div class="title">一封给你的信</div>

    <!-- 信封 -->
    <div class="envelope-container" id="envelope">
        <div class="envelope">
            <div class="envelope-flap"></div>
            <div class="envelope-left"></div>
            <div class="envelope-right"></div>
            <div class="envelope-bottom"></div>
        </div>
        <div class="wax-seal"></div>
        <div class="open-btn" id="openBtn"></div>
        <div class="hint-text">点击信封打开</div>
    </div>

    <script>
        const envelope = document.getElementById('envelope');
        const openBtn = document.getElementById('openBtn');

        // 点击信封打开
        envelope.addEventListener('click', function(e) {
            if (!envelope.classList.contains('open')) {
                envelope.classList.add('open');
                document.querySelector('.hint-text').textContent = '点击按钮查看内容';
            }
        });

        // 点击按钮进入主页面
        openBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            // 添加过渡动画
            document.body.style.transition = 'opacity 0.5s ease';
            document.body.style.opacity = '0';
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 500);
        });
    </script>
</body>
</html>
